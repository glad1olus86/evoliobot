# Nginx конфиг для работы по IP (без SSL)
# Копировать в: /etc/nginx/sites-available/evolio-bot
# Включить:     ln -s /etc/nginx/sites-available/evolio-bot /etc/nginx/sites-enabled/
# Перезапуск:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Callback от Evolio
    location /webhook/evolio {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Опционально: healthcheck
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
