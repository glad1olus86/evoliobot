# Nginx конфиг для работы с доменом + SSL (Let's Encrypt)
# ЗАМЕНИ: your-domain.com на свой домен
#
# Копировать в: /etc/nginx/sites-available/evolio-bot
# Включить:     ln -s /etc/nginx/sites-available/evolio-bot /etc/nginx/sites-enabled/
# SSL:          sudo certbot --nginx -d your-domain.com
# Перезапуск:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    # Certbot сам добавит редирект на 443 после установки SSL
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # Сертификаты (certbot заполнит автоматически)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Callback от Evolio
    location /webhook/evolio {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Healthcheck
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
